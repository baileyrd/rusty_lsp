name: Release

# When the version in Cargo.toml changes on main, create the matching
# vX.Y.Z git tag and a GitHub Release whose notes are that version's
# CHANGELOG.md section. Safe to re-run: it exits early when the tag
# already exists.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read crate version
        id: version
        run: |
          version=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether the tag exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/tags/${{ steps.version.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section
        if: steps.exists.outputs.exists == 'false'
        run: |
          awk -v version="${{ steps.version.outputs.version }}" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "No CHANGELOG.md section for ${{ steps.version.outputs.version }}; using a stub." >&2
            echo "See CHANGELOG.md." > release-notes.md
          fi

      - name: Create tag and release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md
