name: Fuzz

# Not in the PR-blocking path: a weekly smoke-fuzz of the adversarial
# surface (frame parser, message classifier, Uri, edit application), plus
# on-demand runs via workflow_dispatch.

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - name: Fuzz each target briefly
        run: |
          for target in transport message uri apply_edits; do
            cargo +nightly fuzz run "$target" -- -max_total_time=90 -rss_limit_mb=4096
          done
